<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Nexus</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --surface2: #1c1c2a;
      --border: rgba(255,255,255,0.07);
      --accent: #6c63ff;
      --accent2: #ff6b9d;
      --accent3: #43e8b0;
      --text: #f0f0f8;
      --muted: #6b6b8a;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .bg-blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; animation-delay: 0s; }
    .bg-blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; animation-delay: -4s; }
    .bg-blob-3 { width: 300px; height: 300px; background: var(--accent3); bottom: 20%; left: 10%; animation-delay: -8s; }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.08); }
    }

    /* Grid texture overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
      letter-spacing: -1px;
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.5px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 30px;
    }

    /* Social buttons */
    .social-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      white-space: nowrap;
    }
    .social-btn:hover {
      border-color: rgba(255,255,255,0.18);
      background: #22222f;
      transform: translateY(-1px);
    }
    .social-btn svg { flex-shrink: 0; }

    /* Google full-width */
    .social-btn-full {
      width: 100%;
      margin-bottom: 20px;
      padding: 13px;
      font-size: 14px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { color: var(--muted); font-size: 12px; }

    /* Form */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: 0.3px;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    input::placeholder { color: var(--muted); }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }
    .forgot { font-size: 12px; color: var(--accent); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    /* Submit button */
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 4px;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(rgba(255,255,255,0.1), transparent);
      border-radius: inherit;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); opacity: 1; }

    /* Footer */
    .card-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
    }
    .card-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .card-footer a:hover { text-decoration: underline; }

    /* Terms */
    .terms {
      margin-top: 18px;
      text-align: center;
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.6;
    }
    .terms a { color: var(--muted); text-decoration: underline; }

    /* Password toggle */
    .input-wrap { position: relative; }
    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      display: flex; align-items: center;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-mark">Nx</div>
      <span class="logo-name">Nexus</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to your workspace</p>

    <!-- Google (full width) -->
    <a class="social-btn social-btn social-btn-full" id="btn-google" href="/login/google-oauth2?returnTo=%2Fapp">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </a>

    <!-- 2-col social grid -->
    <div class="social-grid">
      <!-- GitHub -->
      <a class="social-btn" id="btn-microsoft" href="/login/microsoft?returnTo=%2Fapp">
        <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#F35325" d="M6 6h17v17H6z"/><path fill="#81BC06" d="M25 6h17v17H25z"/><path fill="#05A6F0" d="M6 25h17v17H6z"/><path fill="#FFBA08" d="M25 25h17v17H25z"/></svg>
        Microsoft
      </a>

      <!-- GitHub -->
      <a class="social-btn" id="btn-github" href="/login/github?returnTo=%2Fapp">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/></svg>
        GitHub
      </a>

      <!-- Apple -->
      <a class="social-btn" id="btn-apple" href="/login/apple?returnTo=%2Fapp">
        <svg width="16" height="16" viewBox="0 0 814 1000" fill="currentColor"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.3-155.8-108.5C46.3 742.6 0 627.8 0 520.3c0-190 124.4-287.6 246.8-287.6 68.8 0 126.2 45.2 169.3 45.2 41.3 0 106-48 184-48 30.7 0 108.8 2.6 168.9 80.4zm-225.7-90.4c31.8-38.2 54.3-91.6 54.3-144.9 0-7.1-.6-14.3-1.9-20.1-51.5 1.9-112.3 34.2-149.2 75.8-28.5 32.4-55.1 85.7-55.1 139.9 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 46.5 0 102.5-30.4 136.4-69.1z"/></svg>
        Apple
      </a>

      <!-- Facebook -->
      <a class="social-btn" id="btn-facebook" href="/login/facebook?returnTo=%2Fapp">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Facebook
      </a>

      <!-- X / Twitter -->
      <a class="social-btn" id="btn-twitter" href="/login/twitter?returnTo=%2Fapp">
        <svg width="15" height="15" viewBox="0 0 300 300" fill="currentColor"><path d="M178.57 127.15 290.27 0h-26.46l-97.03 110.38L89.34 0H0l117.13 166.93L0 300.25h26.46l102.4-116.59 81.8 116.59h89.34M36.01 19.54H76.66l187.13 262.13h-40.66"/></svg>
        X (Twitter)
      </a>

      <!-- LinkedIn -->
      <a class="social-btn" id="btn-linkedin" href="/login/linkedin?returnTo=%2Fapp">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>

      <!-- Discord -->
      <a class="social-btn" id="btn-discord" href="/login/discord?returnTo=%2Fapp">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        Discord
      </a>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or sign in with email</span>
      <div class="divider-line"></div>
    </div>

    <!-- Email/Password form -->
    <form onsubmit="return startEmailLogin(event);">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <div class="field-row">
          <label for="password" style="margin-bottom:0">Password</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
          <button class="toggle-pw" type="button" onclick="togglePw(this)" aria-label="Toggle password">
            <svg id="eye-open" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-closed" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button class="btn-primary" type="submit">Sign in</button>
    </form>

    <p class="card-footer">Don't have an account? <a href="#">Create one free</a></p>
    <p class="terms">By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
  </div>

  <script>
    function togglePw(btn) {
      const pw = document.getElementById('password');
      const open = document.getElementById('eye-open');
      const closed = document.getElementById('eye-closed');
      if (pw.type === 'password') {
        pw.type = 'text';
        open.style.display = 'none';
        closed.style.display = 'block';
      } else {
        pw.type = 'password';
        open.style.display = 'block';
        closed.style.display = 'none';
      }
    }

    function startEmailLogin(e) {
      if (e) e.preventDefault();
      window.location.href = "/login?returnTo=%2Fapp";
      return false;
    }

    (async function syncConnections() {
      if (window.location.protocol === "file:") return;
      try {
        const res = await fetch("/api/auth-connections", { credentials: "include" });
        const payload = res.ok ? await res.json() : {};
        const connections = Array.isArray(payload.connections) ? payload.connections : [];

        const byLabel = {};
        connections.forEach((c) => {
          if (!c || typeof c.id !== "string" || typeof c.label !== "string") return;
          byLabel[c.label.trim().toLowerCase()] = c.id.trim();
        });

        const map = [
          ["btn-google", "google", "google-oauth2"],
          ["btn-microsoft", "microsoft", byLabel["microsoft"] || "windowslive"],
          ["btn-github", "github", "github"],
          ["btn-apple", "apple", "apple"],
          ["btn-facebook", "facebook", "facebook"],
          ["btn-twitter", "twitter", "twitter"],
          ["btn-linkedin", "linkedin", "linkedin"],
          ["btn-discord", "discord", "discord"]
        ];

        map.forEach(([id, labelKey, fallbackId]) => {
          const el = document.getElementById(id);
          if (!el) return;
          const conn = byLabel[labelKey] || fallbackId;
          if (!conn) {
            el.style.display = "none";
            return;
          }
          el.href = "/login/" + encodeURIComponent(conn) + "?returnTo=%2Fapp";
        });
      } catch {
      }
    })();
  </script>
</body>
</html>
